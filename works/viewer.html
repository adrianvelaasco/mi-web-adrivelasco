    <script>
        function checkRedirect() {
            // Get clean path (e.g. 'works/three-years')
            const path = window.location.pathname.replace(/^\/|\/$/g, '');
            const params = window.location.search;
            let targetSuffix = params;

            // Extract work ID from path if present (e.g. works/three-years -> three-years)
            // But we need to be careful not to create a loop.
            // If path is clean, we pass it.

            if (path && !path.includes('viewer.html')) {
                // If it's a clean work URL like /works/three-years
                // We extract the last part
                const parts = path.split('/');
                const workId = parts.length > 1 ? parts[parts.length - 1] : null;

                if (workId && !params.includes('work=')) {
                    targetSuffix = '?work=' + workId + (params ? '&' + params.slice(1) : '');
                }
            }

            if (window.innerWidth < 768) {
                window.location.href = "viewer_mobile.html" + targetSuffix;
            } else if (window.innerWidth < 1024) {
                window.location.href = "viewer_tablet.html" + targetSuffix;
            }
        }
        window.addEventListener('resize', checkRedirect);
        checkRedirect();
    </script>

    <script>
        function openMZOverlay() {
            const iframe = document.getElementById('mzuhause-iframe');
            iframe.src = '../meinzuhause/index.html?embedded=1';
            document.getElementById('mzuhause-overlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeMZOverlay() {
            const iframe = document.getElementById('mzuhause-iframe');
            iframe.src = ''; // Stops audio
            document.getElementById('mzuhause-overlay').classList.remove('active');
            document.body.style.overflow = '';
        }
        let flipBook = null;
        let currentPDF = null;
        let currentLoadingTask = null;
        let currentLoadedScoreUrl = null;
        let isScoreLoading = false;
        let currentScoreRequestId = 0;

        let sharedAudio = null; // Single audio element shared between WaveSurfers
        let scoreWavesurfer = null;
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

        async function openScoreOverlay(url, audioUrl = '') {
            console.log("Score Request:", url);
            const overlay = document.getElementById('score-overlay');
            const loadingIndicator = document.getElementById('score-loading');

            // Handle Score Audio Section Visibility
            const audioSection = document.getElementById('score-audio-section');
            if (audioUrl) {
                audioSection.style.visibility = 'visible';
                initScoreWaveform(audioUrl);
            } else {
                audioSection.style.visibility = 'hidden';
            }

            // IF ALREADY LOADED OR CURRENTLY LOADING THE SAME ONE, JUST SHOW
            if (url === currentLoadedScoreUrl) {
                overlay.classList.add('active');
                document.body.style.overflow = 'hidden';
                loadingIndicator.style.display = 'none'; // Ensure hidden if done
                return;
            }

            const requestId = ++currentScoreRequestId;
            isScoreLoading = true;
            currentLoadedScoreUrl = null;

            let container = document.getElementById('book-container');
            if (!container) {
                console.warn("book-container not found! Recreating...");
                const wrapper = document.getElementById('book-wrapper');
                if (wrapper) {
                    container = document.createElement('div');
                    container.id = 'book-container';
                    wrapper.prepend(container);
                } else {
                    console.error("Critical: book-wrapper missing!");
                    return;
                }
            }

            overlay.classList.add('active');
            document.body.style.overflow = 'hidden';
            loadingIndicator.style.display = 'block';

            const curLang = localStorage.getItem('preferredLanguage') || 'en';
            loadingIndicator.textContent = window.navTranslations ? window.navTranslations[curLang]['loading-score'] : "Loading Score...";

            container.innerHTML = '';
            container.style.transform = 'translate(0,0) scale(1)';

            // Cancel any previous PDF loading
            if (currentLoadingTask) {
                try { currentLoadingTask.destroy(); } catch (e) { }
                currentLoadingTask = null;
            }
            if (flipBook) {
                try { flipBook.destroy(); } catch (e) { }
                flipBook = null;
            }
            if (currentPDF) {
                try { currentPDF.destroy(); } catch (e) { }
                currentPDF = null;
            }

            try {
                currentLoadingTask = pdfjsLib.getDocument(url);
                currentPDF = await currentLoadingTask.promise;
                if (requestId !== currentScoreRequestId) return;

                const totalPages = currentPDF.numPages;
                const firstPage = await currentPDF.getPage(1);
                if (requestId !== currentScoreRequestId) return;

                const viewport = firstPage.getViewport({ scale: 1.5 });
                const bookW = viewport.width;
                const bookH = viewport.height;

                // Create pages
                for (let i = 1; i <= totalPages; i++) {
                    if (requestId !== currentScoreRequestId) return;

                    const pageDiv = document.createElement('div');
                    pageDiv.className = 'page';
                    const contentDiv = document.createElement('div');
                    contentDiv.className = 'page-content';
                    const canvas = document.createElement('canvas');
                    canvas.className = 'pdf-canvas';

                    contentDiv.appendChild(canvas);
                    pageDiv.appendChild(contentDiv);
                    container.appendChild(pageDiv);

                    const page = await currentPDF.getPage(i);
                    if (requestId !== currentScoreRequestId) return;

                    const context = canvas.getContext('2d');
                    const pageViewport = page.getViewport({ scale: 2 });
                    canvas.width = pageViewport.width;
                    canvas.height = pageViewport.height;

                    await page.render({ canvasContext: context, viewport: pageViewport }).promise;
                    if (requestId !== currentScoreRequestId) return;
                }

                // Final check before initializing the book widget
                if (requestId !== currentScoreRequestId) return;

                // Calculate responsive container dimensions
                const maxW = window.innerWidth * 0.8;
                const maxH = window.innerHeight * 0.72;
                const aspect = bookH / (bookW * 2);

                let targetW = maxW;
                let targetH = targetW * aspect;

                if (targetH > maxH) {
                    targetH = maxH;
                    targetW = targetH / aspect;
                }

                container.style.width = `${targetW}px`;
                container.style.height = `${targetH}px`;

                flipBook = new St.PageFlip(container, {
                    width: bookW, height: bookH,
                    size: 'stretch', minWidth: 200, maxWidth: 3000,
                    minHeight: 200, maxHeight: 3000,
                    showCover: true, mobileScrollSupport: false,
                    usePortrait: false, startPage: 0, flippingTime: 300
                });

                if (requestId !== currentScoreRequestId) return;
                flipBook.loadFromHTML(container.querySelectorAll('.page'));

                // Add the flip shield to restrict interaction to edges
                const shield = document.createElement('div');
                shield.id = 'flip-shield';
                container.appendChild(shield);

                // Success!
                currentLoadedScoreUrl = url;
                loadingIndicator.style.display = 'none';
                setupScoreControls(totalPages, bookW, bookH);

            } catch (err) {
                console.log("Score Load (Req " + requestId + "):", err.name || "Error", err.message || err);
                // Only show error if this is still the current request
                if (requestId === currentScoreRequestId) {
                    loadingIndicator.textContent = "Error loading PDF";
                    loadingIndicator.style.display = 'block';
                }
            } finally {
                if (requestId === currentScoreRequestId) {
                    isScoreLoading = false;
                }
            }
        }

        function setupScoreControls(totalPages, bookW, bookH) {
            const slider = document.getElementById('book-slider');
            const prevBtn = document.getElementById('book-prev');
            const nextBtn = document.getElementById('book-next');
            const zoomSlider = document.getElementById('zoom-slider');
            const zoomValue = document.getElementById('zoom-level');
            const counter = document.getElementById('page-counter');
            const wrapper = document.getElementById('book-wrapper');
            const bookContainer = document.getElementById('book-container');

            slider.max = totalPages - 1;
            slider.value = 0;
            counter.textContent = `1 / ${totalPages}`;
            prevBtn.disabled = true;
            nextBtn.disabled = totalPages <= 1;

            // Internal state for zoom/pan
            let currentZoom = 1;
            let transX = 0;
            let transY = 0;
            let isDragging = false;
            let lastX, lastY;

            const updateTransform = () => {
                const limitX = (currentZoom - 1) * (bookW / 2);
                const limitY = (currentZoom - 1) * (bookH / 2);

                // Calculate cover shift (if double page mode)
                let shiftX = 0;
                if (flipBook) {
                    const page = flipBook.getCurrentPageIndex();
                    const total = flipBook.getPageCount();

                    // Critical: Calculate the ACTUAL rendered width of a single page 
                    // based on the container's current height and the PDF's aspect ratio.
                    const actualPageW = bookContainer.offsetHeight * (bookW / bookH);

                    if (page === 0) {
                        // Center the right-hand cover page
                        shiftX = - (actualPageW / 2);
                    } else if (page === total - 1 && total % 2 === 0) {
                        // Center the left-hand back cover page
                        shiftX = (actualPageW / 2);
                    }
                }

                if (currentZoom === 1) {
                    transX = 0; transY = 0;
                    wrapper.classList.remove('zoomed-mode');
                } else {
                    wrapper.classList.add('zoomed-mode');
                    transX = Math.max(-limitX - 400, Math.min(limitX + 400, transX));
                    transY = Math.max(-limitY - 400, Math.min(limitY + 400, transY));
                }

                bookContainer.style.transform = `translate(${transX + shiftX}px, ${transY}px) scale(${currentZoom})`;
                zoomSlider.value = currentZoom;
                zoomValue.textContent = `x${currentZoom.toFixed(1)}`;
            };

            const changeZoom = (newZ) => {
                const oldZoom = currentZoom;
                currentZoom = Math.max(1, Math.min(4, newZ));
                if (oldZoom > 1) {
                    const ratio = (currentZoom - 1) / (oldZoom - 1);
                    transX *= ratio; transY *= ratio;
                }
                updateTransform();
            };

            // Overwrite existing handlers to ensure fresh closure
            zoomSlider.oninput = (e) => changeZoom(parseFloat(e.target.value));
            prevBtn.onclick = () => flipBook.flipPrev();
            nextBtn.onclick = () => flipBook.flipNext();
            slider.oninput = (e) => flipBook.flip(parseInt(e.target.value));

            // Wheel handler (Clean up old then add new)
            const wheelHandler = (e) => {
                e.preventDefault();
                const scaleFactor = e.ctrlKey ? 0.01 : 0.005;
                changeZoom(currentZoom - e.deltaY * scaleFactor);
            };
            wrapper.onwheel = wheelHandler; // Use onwheel to easily overwrite

            // Mousedown for Pan
            wrapper.onmousedown = (e) => {
                if (currentZoom <= 1 || e.target.closest('.book-controls')) return;
                isDragging = true;
                window.isDraggingScore = true;
                lastX = e.pageX; lastY = e.pageY;
            };

            // Global move/up (One-time registration outside if preferred, but here we can scope)
            if (!window.scoreEventRegistered) {
                window.addEventListener('mouseup', () => window.isDraggingScore = false);
                window.addEventListener('mousemove', (e) => {
                    if (!window.isDraggingScore || !window.updateScoreTransform) return;
                    e.preventDefault();
                    window.updateScoreTransform(e.pageX, e.pageY);
                });
                window.scoreEventRegistered = true;
            }

            // Bridge to global listeners
            window.isDraggingScore = false;
            window.updateScoreTransform = (pageX, pageY) => {
                if (!isDragging) return;
                const dx = pageX - lastX;
                const dy = pageY - lastY;
                transX += dx; transY += dy;
                lastX = pageX; lastY = pageY;
                updateTransform();
            };
            // Ensure mouseup sets OUR local isDragging to false
            const globalMouseUp = () => isDragging = false;
            window.addEventListener('mouseup', globalMouseUp, { once: true });

            flipBook.on('flip', (e) => {
                const currentPage = e.data + 1;
                slider.value = e.data;
                counter.textContent = `${currentPage} / ${totalPages}`;
                prevBtn.disabled = e.data === 0;
                nextBtn.disabled = e.data === totalPages - 1;

                // Recalculate transform to handle cover centering
                updateTransform();
            });

            // Initial center transform
            setTimeout(() => updateTransform(), 250);
        }

            // Reset Subtitles
            currentSubtitles = [];
            document.getElementById('ccBtn').style.display = 'none';
            document.getElementById('ccBtn').classList.remove('active');
            document.getElementById('subtitleOverlay').style.display = 'none';
            document.getElementById('subtitleOverlay').innerHTML = '';

            // Create shared audio element if not exists or URL changed
            if (!sharedAudio || sharedAudio.src.indexOf(url.replace('../', '')) === -1) {
                sharedAudio = new Audio();
                sharedAudio.src = url;

                // Add centralized listeners to the shared audio element itself
                sharedAudio.addEventListener('play', updateAllAudioIcons);
                sharedAudio.addEventListener('pause', updateAllAudioIcons);
                sharedAudio.addEventListener('playing', updateAllAudioIcons);
                sharedAudio.addEventListener('ended', updateAllAudioIcons);
            }

            window.wavesurfer = WaveSurfer.create({
                container: '#waveform',
                waveColor: '#ffffff',
                progressColor: 'rgba(0, 0, 255, 0.7)',
                cursorColor: '#0000ff',
                barWidth: 2,
                barRadius: 3,
                responsive: true,
                height: height,
                normalize: true,
                media: sharedAudio, // Use the shared element
            });

            const playBtn = document.getElementById('playPauseBtn');
            const playIcon = document.getElementById('playIcon');
            const pauseIcon = document.getElementById('pauseIcon');
            const ccBtn = document.getElementById('ccBtn');
            const subOverlay = document.getElementById('subtitleOverlay');

            playBtn.onclick = () => window.wavesurfer.playPause();

            // Load Subtitles
            if (subSrc) {
                fetch(subSrc)
                    .then(r => r.text())
                    .then(data => {
                        currentSubtitles = parseSRT(data);
                        ccBtn.style.display = 'block';
                    });
            }

            ccBtn.onclick = () => {
                const isActive = ccBtn.classList.toggle('active');
                subOverlay.style.display = isActive ? 'flex' : 'none';
            };

            // Wavesurfer events will still trigger relative to the media 
            // but the icon sync is now handled by the sharedAudio element itself.
            window.wavesurfer.on('play', updateAllAudioIcons);
            window.wavesurfer.on('pause', updateAllAudioIcons);

            const timeEl = document.getElementById('currentTime');
            const durationEl = document.getElementById('totalDuration');

            window.wavesurfer.on('decode', (duration) => {
                durationEl.textContent = formatTime(duration);
            });

            window.wavesurfer.on('timeupdate', (currentTime) => {
                timeEl.textContent = formatTime(currentTime);

                // Update Subtitles
                if (ccBtn.classList.contains('active')) {
                    const activeSub = currentSubtitles.find(s => currentTime >= s.start && currentTime <= s.end);
                    subOverlay.innerHTML = activeSub ? activeSub.text : '';
                }
            });
        }

        function initScoreWaveform(url) {
            if (scoreWavesurfer) scoreWavesurfer.destroy();

            scoreWavesurfer = WaveSurfer.create({
                container: '#score-waveform',
                waveColor: 'rgba(255,255,255,0.25)',
                progressColor: '#00ccff', // Light Blue
                cursorColor: '#ffffff',
                barWidth: 2,
                barRadius: 2,
                responsive: true,
                height: 26,
                normalize: true,
                media: sharedAudio,
            });

            const scorePlayBtn = document.getElementById('scorePlayPauseBtn');
            const scorePlayIcon = scorePlayBtn.querySelector('.play-icon');
            const scorePauseIcon = scorePlayBtn.querySelector('.pause-icon');

            scorePlayBtn.onclick = () => scoreWavesurfer.playPause();

            // Sync icons to current audio state immediately
            updateAllAudioIcons();

            scoreWavesurfer.on('play', updateAllAudioIcons);
            scoreWavesurfer.on('pause', updateAllAudioIcons);

            const scoreTimeEl = document.getElementById('scoreCurrentTime');
            const scoreDurationEl = document.getElementById('scoreTotalDuration');

            scoreWavesurfer.on('decode', (duration) => {
                if (scoreDurationEl) scoreDurationEl.textContent = formatTime(duration);
            });

            scoreWavesurfer.on('timeupdate', (currentTime) => {
                if (scoreTimeEl) scoreTimeEl.textContent = formatTime(currentTime);
            });
        }

        // Navigation logic
        document.getElementById('prevWork').addEventListener('click', () => {
            currentIndex = (currentIndex > 0) ? currentIndex - 1 : worksData.length - 1;
            renderWork(currentIndex);
        });

        document.getElementById('nextWork').addEventListener('click', () => {
            currentIndex = (currentIndex < worksData.length - 1) ? currentIndex + 1 : 0;
            renderWork(currentIndex);
        });

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            const isScoreActive = document.getElementById('score-overlay').classList.contains('active');
            const lightbox = document.getElementById('photo-lightbox');
            const isLightboxActive = lightbox && lightbox.classList.contains('active');

            if (e.key === 'ArrowLeft') {
                if (isLightboxActive) {
                    changeLightboxImage(-1);
                } else if (isScoreActive && flipBook) {
                    flipBook.flipPrev();
                } else {
                    document.getElementById('prevWork').classList.add('active');
                    currentIndex = (currentIndex > 0) ? currentIndex - 1 : worksData.length - 1;
                    renderWork(currentIndex);
                }
            } else if (e.key === 'ArrowRight') {
                if (isLightboxActive) {
                    changeLightboxImage(1);
                } else if (isScoreActive && flipBook) {
                    flipBook.flipNext();
                } else {
                    document.getElementById('nextWork').classList.add('active');
                    currentIndex = (currentIndex < worksData.length - 1) ? currentIndex + 1 : 0;
                    renderWork(currentIndex);
                }
            } else if (e.key === 'Escape') {
                if (isLightboxActive) closeLightbox();
                else if (isScoreActive) closeScoreOverlay();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft') {
                document.getElementById('prevWork').classList.remove('active');
            } else if (e.key === 'ArrowRight') {
                document.getElementById('nextWork').classList.remove('active');
            }
        });

        // Handle back/forward browser buttons
        window.addEventListener('popstate', (event) => {
            if (event.state && event.state.index !== undefined) {
                currentIndex = event.state.index;
                renderWork(currentIndex, false); // false to avoid pushState loop
            } else {
                // Try to find by URL if no state
                const urlParams = new URLSearchParams(window.location.search);
                const workId = urlParams.get('work');
                if (workId) {
                    const found = worksData.findIndex(w => w.id === workId);
                    if (found !== -1) {
                        currentIndex = found;
                        renderWork(currentIndex, false);
                    }
                }
            }
        });

        // --- EYE CURSOR LOGIC ---
        document.addEventListener('mousemove', (e) => {
            const eye = document.getElementById('custom-eye-cursor');
            if (eye) {
                eye.style.left = e.clientX + 'px';
                eye.style.top = e.clientY + 'px';
            }
        });

        document.addEventListener('mouseover', (e) => {
            const wrapper = e.target.closest('.image-wrapper');
            const eye = document.getElementById('custom-eye-cursor');
            if (eye) {
                if (wrapper) eye.classList.add('active');
                else eye.classList.remove('active');
            }
        });

        window.addEventListener('load', () => {
            // Check for clean URL first: /works/three-years
            const path = window.location.pathname.replace(/^\/|\/$/g, '');
            const parts = path.split('/');
            let workId = null;

            // If the last part is a work ID (and not 'works' or 'viewer.html')
            // Works IDs: personas, ebdvp, pianogames, rumble, osc, three-years, game-of-life, another-music, lespontanea, minuit, cisne
            const knownIds = worksData.map(w => w.id);
            const possibleId = parts[parts.length - 1];

            if (knownIds.includes(possibleId)) {
                workId = possibleId;
            } else {
                // Fallback to query param
                const urlParams = new URLSearchParams(window.location.search);
                workId = urlParams.get('work');
            }

            if (workId) {
                const found = worksData.findIndex(w => w.id === workId);
                if (found !== -1) currentIndex = found;
            }
            renderWork(currentIndex, true);
        });

        // Subtitle Helpers
        let currentSubtitles = [];

        function parseSRT(data) {
            const subs = [];
            const blocks = data.trim().split(/\n\s*\n/);
            const srtRegex = new RegExp("(\\d{2}:\\d{2}:\\d{2},\\d{2,3}) --> (\\d{2}:\\d{2}:\\d{2},\\d{2,3})");
            blocks.forEach(block => {
                const lines = block.split(/\n/);
                if (lines.length >= 2) {
                    const timeRange = block.match(srtRegex);
                    if (timeRange) {
                        // Filter out numeric sequence line and the timing line itself
                        const filteredLines = lines.filter(line => {
                            const trimmed = line.trim();
                            if (/^\d+$/.test(trimmed)) return false; // sequence number
                            if (srtRegex.test(trimmed)) return false; // timing line
                            return true;
                        });
                        const textLines = filteredLines.join('<br>');
                        subs.push({
                            start: srtTimeToSeconds(timeRange[1]),
                            end: srtTimeToSeconds(timeRange[2]),
                            text: textLines
                        });
                    }
                }
            });
            return subs;
        }

        function srtTimeToSeconds(timeStr) {
            const parts = timeStr.replace(',', '.').split(':');
            return parseFloat(parts[0]) * 3600 + parseFloat(parts[1]) * 60 + parseFloat(parts[2]);
        }

        // Photo Lightbox logic
        let currentLightboxImages = [];
        let currentLightboxIndex = 0;

        function openLightbox(index) {
            const work = worksData[currentIndex];
            if (!work.images) return;

            currentLightboxImages = work.images;
            currentLightboxIndex = index;

            const overlay = document.getElementById('photo-lightbox');
            overlay.style.display = 'flex';
            setTimeout(() => overlay.classList.add('active'), 10);

            updateLightbox();
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const overlay = document.getElementById('photo-lightbox');
            overlay.classList.remove('active');
            setTimeout(() => overlay.style.display = 'none', 300);
            document.body.style.overflow = '';
        }

        function updateLightbox() {
            const img = document.getElementById('lightbox-img');
            const caption = document.getElementById('lightbox-caption');
            const counter = document.getElementById('lightbox-counter');
            const work = worksData[currentIndex];

            counter.textContent = `${currentLightboxIndex + 1} / ${currentLightboxImages.length}`;

            img.style.opacity = '0';
            img.style.transform = 'scale(0.97)';

            setTimeout(() => {
                img.src = '../images/meinzuhause/' + currentLightboxImages[currentLightboxIndex];
                caption.innerHTML = work.imageCaption || '';
                img.style.opacity = '1';
                img.style.transform = 'scale(1)';
            }, 100);

            // Hide nav if only 1 image
            const showNav = currentLightboxImages.length > 1;
            document.getElementById('lightbox-prev').style.display = showNav ? 'flex' : 'none';
            document.getElementById('lightbox-next').style.display = showNav ? 'flex' : 'none';
        }

        function changeLightboxImage(dir) {
            currentLightboxIndex += dir;
            if (currentLightboxIndex < 0) currentLightboxIndex = currentLightboxImages.length - 1;
            if (currentLightboxIndex >= currentLightboxImages.length) currentLightboxIndex = 0;
            updateLightbox();
        }

        // Handle Escape click on background
        document.getElementById('photo-lightbox').onclick = (e) => {
            if (e.target.id === 'photo-lightbox') closeLightbox();
        };

        // Listener for iframe events (e.g. Mein Zuhause state changes)
        window.addEventListener('message', (e) => {
            const mzBtn = document.getElementById('mzuhause-close');
            if (!mzBtn) return;
            if (e.data === 'hide-close') mzBtn.classList.add('hide');
            if (e.data === 'show-close') mzBtn.classList.remove('hide');
            if (e.data === 'blue-close') {
                mzBtn.classList.remove('black');
                mzBtn.classList.add('blue');
            }
            if (e.data === 'black-close') {
                mzBtn.classList.remove('blue');
                mzBtn.classList.add('black');
            }
            if (e.data === 'white-close') {
                mzBtn.classList.remove('blue', 'black');
            }
        });
    </script>

</body>
